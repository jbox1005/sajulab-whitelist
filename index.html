<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0066cc">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="사주랩 라이센스">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>사주랩 라이센스 등록</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header>
    <h1>사주랩 라이센스 등록</h1>
    <button id="settingsBtn" class="icon-btn" title="설정">⚙</button>
  </header>

  <main>
    <section class="card">
      <label for="hashInput">해시값</label>
      <input type="text" id="hashInput" placeholder="A3F2-B1C8-D4E5-F6A7"
             autocomplete="off" autocapitalize="characters" inputmode="text" />

      <label for="noteInput">메모 (누구의 PC인지)</label>
      <input type="text" id="noteInput" placeholder="예: 김OO 노트북" autocomplete="off" />

      <button id="submitBtn" class="primary">등록</button>
      <p id="statusMsg" class="status"></p>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>등록된 PC</h2>
        <button id="reloadBtn" class="ghost">새로고침</button>
      </div>
      <input type="search" id="searchInput" placeholder="해시/메모 검색..." />
      <ul id="entryList" class="entry-list">
        <li class="empty">불러오는 중...</li>
      </ul>
    </section>
  </main>

  <div id="settingsModal" class="modal hidden">
    <div class="modal-inner">
      <h3>GitHub 설정</h3>
      <label for="patInput">Personal Access Token (PAT)</label>
      <input type="password" id="patInput" placeholder="ghp_..." autocomplete="off" />
      <p class="hint">권한: <code>repo</code> 또는 <code>public_repo</code> · 토큰은 이 기기에만 저장됩니다.</p>
      <div class="modal-actions">
        <button id="settingsSave" class="primary">저장</button>
        <button id="settingsCancel" class="ghost">취소</button>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
